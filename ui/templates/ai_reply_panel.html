<!-- AI Response Panel Component -->
<!-- Include this in your email card for AI draft generation -->

<div id="ai-reply-panel" style="display: none;" class="ai-reply-container">
    <div class="ai-reply-header">
        <h3>🤖 AI Response Assistant</h3>
        <button class="close-btn" onclick="closeAIReplyPanel()">×</button>
    </div>
    
    <!-- Tone Selection -->
    <div class="tone-selector">
        <label>Response Tone:</label>
        <select id="tone-select" onchange="regenerateWithTone()">
            <option value="professional" selected>Professional</option>
            <option value="friendly">Friendly</option>
            <option value="formal">Formal</option>
            <option value="concise">Concise</option>
            <option value="enthusiastic">Enthusiastic</option>
            <option value="apologetic">Apologetic</option>
        </select>
    </div>
    
    <!-- Safety Warnings -->
    <div id="safety-warnings" style="display: none;" class="safety-alert">
        <strong>⚠️ Safety Check:</strong>
        <ul id="warning-list"></ul>
        <p class="safety-note">Please review before sending.</p>
    </div>
    
    <!-- Generated Response -->
    <div class="response-container">
        <label>Generated Response:</label>
        <textarea id="ai-response-text" rows="8" placeholder="Generating response..."></textarea>
        <div class="response-stats">
            <span id="confidence-badge">Confidence: --</span>
            <span id="length-counter">0 chars</span>
        </div>
    </div>
    
    <!-- Context Panel -->
    <div class="context-panel">
        <details>
            <summary>📋 Generation Context</summary>
            <div id="context-details">
                <p><strong>Thread Summary:</strong> <span id="thread-summary">-</span></p>
                <p><strong>Detected Tone:</strong> <span id="detected-tone">-</span></p>
                <p><strong>Urgency Level:</strong> <span id="urgency-level">-</span></p>
                <p><strong>Recommended Approach:</strong> <span id="recommendation">-</span></p>
            </div>
        </details>
    </div>
    
    <!-- Action Buttons -->
    <div class="action-buttons">
        <button class="btn btn-primary" onclick="approveDraft()">
            ✓ Approve & Draft
        </button>
        <button class="btn btn-secondary" onclick="editAndSave()">
            ✏️ Edit & Save
        </button>
        <button class="btn btn-tertiary" onclick="regenerateWithTone()">
            🔄 Regenerate
        </button>
        <button class="btn btn-danger" onclick="rejectDraft()">
            ✗ Reject
        </button>
    </div>
    
    <!-- Send Dialog -->
    <div id="send-dialog" style="display: none;" class="modal">
        <div class="modal-content">
            <h3>Send Email Response?</h3>
            <p>This will send the response to: <strong id="send-to-addr"></strong></p>
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="confirmSend()">Send Now</button>
                <button class="btn btn-secondary" onclick="saveDraftOnly()">Save as Draft</button>
                <button class="btn btn-tertiary" onclick="closeSendDialog()">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script>
// AI Response Panel Functions

let currentResponseId = null;
let currentEmailData = null;

async function showAIReplyPanel(emailData) {
    currentEmailData = emailData;
    document.getElementById('ai-reply-panel').style.display = 'block';
    
    // Generate initial response
    await generateResponse('professional');
}

function closeAIReplyPanel() {
    document.getElementById('ai-reply-panel').style.display = 'none';
    currentResponseId = null;
    currentEmailData = null;
}

async function generateResponse(tone) {
    if (!currentEmailData) return;
    
    const textarea = document.getElementById('ai-response-text');
    textarea.value = 'Generating response...';
    
    try {
        const response = await fetch('/api/responses/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message_id: currentEmailData.id,
                thread_id: currentEmailData.thread_id,
                sender: currentEmailData.sender,
                subject: currentEmailData.subject,
                body: currentEmailData.body,
                tone: tone,
            }),
        });
        
        const result = await response.json();
        
        if (result.success) {
            currentResponseId = result.response_id;
            textarea.value = result.generated_text;
            
            // Update confidence
            const confidence = Math.round(result.confidence * 100);
            document.getElementById('confidence-badge').textContent = `Confidence: ${confidence}%`;
            
            // Update character count
            document.getElementById('length-counter').textContent = `${result.generated_text.length} chars`;
            
            // Show warnings if any
            if (result.warnings && result.warnings.length > 0) {
                document.getElementById('safety-warnings').style.display = 'block';
                const warningList = document.getElementById('warning-list');
                warningList.innerHTML = result.warnings
                    .map(w => `<li>${w}</li>`)
                    .join('');
            } else {
                document.getElementById('safety-warnings').style.display = 'none';
            }
        } else {
            textarea.value = `Error: ${result.error}`;
        }
    } catch (error) {
        textarea.value = `Error: ${error.message}`;
    }
}

async function regenerateWithTone() {
    const tone = document.getElementById('tone-select').value;
    await generateResponse(tone);
}

function approveDraft() {
    const responseText = document.getElementById('ai-response-text').value;
    recordFeedback('approved', responseText);
    showSendDialog();
}

function editAndSave() {
    const editedText = document.getElementById('ai-response-text').value;
    recordFeedback('edited', editedText);
    alert('Response saved with your edits. Email draft created.');
    closeAIReplyPanel();
}

function rejectDraft() {
    recordFeedback('rejected', '');
    closeAIReplyPanel();
}

async function recordFeedback(feedbackType, responseText) {
    if (!currentResponseId) return;
    
    try {
        await fetch('/api/responses/feedback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                response_id: currentResponseId,
                sender: currentEmailData?.sender,
                feedback_type: feedbackType,
                edited_text: responseText,
                approval_time_seconds: 5.0,
                feedback_notes: '',
            }),
        });
    } catch (error) {
        console.error('Error recording feedback:', error);
    }
}

function showSendDialog() {
    document.getElementById('send-to-addr').textContent = currentEmailData?.sender || '';
    document.getElementById('send-dialog').style.display = 'flex';
}

function closeSendDialog() {
    document.getElementById('send-dialog').style.display = 'none';
}

async function confirmSend() {
    alert('Email sent! (Integration with Gmail API required)');
    closeSendDialog();
    closeAIReplyPanel();
}

function saveDraftOnly() {
    alert('Draft saved to Gmail! (Integration with Gmail API required)');
    closeSendDialog();
    closeAIReplyPanel();
}

// Update character counter on manual edits
document.addEventListener('DOMContentLoaded', function() {
    const textarea = document.getElementById('ai-response-text');
    if (textarea) {
        textarea.addEventListener('input', function() {
            document.getElementById('length-counter').textContent = `${this.value.length} chars`;
        });
    }
});
</script>
