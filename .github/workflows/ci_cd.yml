name: CI / CD

# on:
#   push:
#     branches: [main, develop]
#   pull_request:
#     branches: [main]
on:
  push:
    branches:
      - main
      - lohith-mlops-update

  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: email-timing-response
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI || 'mlruns' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: pip install black==24.4.2 isort==5.13.2 flake8==7.1.0

      - name: Black formatting check
        run: black --check --line-length 88 .

      - name: isort import order check
        run: isort --check-only --profile black .

      - name: Flake8 style check
        run: >
          flake8 . --max-line-length 88 --extend-ignore=E402,E203
          --exclude=.git,__pycache__,train_colab.ipynb,venv

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing \
            --ignore=tests/test_api.py

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  mlflow-train:
    name: MLflow Train
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train with MLflow
        run: >
          python pipelines/training_pipeline.py --episodes 300 --agent dqn
          --run-name ci_${{ github.sha }}

      - name: Upload MLflow runs
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-${{ github.sha }}
          path: mlruns/
          retention-days: 30

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, mlflow-train]
    if: >
      always() &&
      needs.test.result == 'success' &&
      (needs.mlflow-train.result == 'success' ||
      needs.mlflow-train.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy-Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: >
      (github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/lohith-mlops-update') &&
      github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repo
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push staging image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}:staging
            ghcr.io/${{ env.REPO }}:${{ github.sha }}

      - name: Deploy to staging server
        run: |
          echo "Deploying ghcr.io/${{ env.REPO }}:${{ github.sha }} to staging"
          # Example: ssh deploy@staging.host "docker pull ... && docker restart app"
